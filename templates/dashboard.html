{% extends "base.html" %}
{% block title %}Dashboard — Stock Dashboard{% endblock %}

{% block content %}
<h1>Market Dashboard</h1>

<div class="card">
  <h2>Price Chart</h2>
  <form id="ticker-form" role="search" aria-label="Ticker search">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <label for="ticker-input" style="color:#888;font-size:14px;">Ticker</label>
      <input
        id="ticker-input"
        type="text"
        value="AAPL"
        maxlength="10"
        style="width:120px;text-transform:uppercase;"
        aria-label="Stock ticker symbol"
        placeholder="e.g. AAPL"
      />
      <button type="submit">Load Chart</button>
    </div>
  </form>

  <div style="margin-top:16px;">
    <span id="current-price-label" style="color:#888;font-size:14px;">Current price:</span>
    <span id="current-price" style="color:#4fc3f7;font-size:22px;font-weight:700;margin-left:8px;">—</span>
    <span id="price-ticker-label" style="color:#888;font-size:14px;margin-left:4px;"></span>
  </div>

  <div style="margin-top:20px;position:relative;height:300px;">
    <canvas id="price-chart" role="img" aria-label="Price history chart"></canvas>
  </div>
</div>

<div class="card">
  <h2>Quick Stats</h2>
  <div id="quick-stats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">
    <p style="color:#888;">Load a ticker to see stats.</p>
  </div>
</div>

<script>
  // Inline page init — triggers after app.js and charts.js are loaded.
  document.addEventListener("DOMContentLoaded", function () {
    if (typeof initDashboard === "function") {
      initDashboard();
    }
  });
</script>
{% endblock %}
